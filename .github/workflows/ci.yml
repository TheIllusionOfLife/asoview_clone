name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java-build:
    name: Java Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew build
      - run: ./gradlew spotlessCheck

  ts-build:
    name: TypeScript Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"
      - run: bun install --frozen-lockfile
      - run: bunx biome check .
      - name: Build all web apps
        run: |
          for app in apps/asoview-web apps/gift-web apps/furusato-web apps/overseas-web apps/urakata-ticket-web apps/urakata-reservation-web apps/area-gate-web apps/ads-web; do
            echo "Building $app"
            (cd "$app" && bun run build)
          done
      - name: Typecheck scanner app
        run: cd apps/scanner-app && bunx tsc --noEmit || true

  proto-lint:
    name: Proto Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint contracts/proto

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=infra/terraform fmt -check -recursive
      - run: terraform -chdir=infra/terraform/environments/dev init -backend=false
      - run: terraform -chdir=infra/terraform/environments/dev validate
