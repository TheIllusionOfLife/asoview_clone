server:
  port: 8080

spring:
  cloud:
    gateway:
      # Spring Cloud Gateway WebFlux 2025.x moved the property path from
      # spring.cloud.gateway.routes to spring.cloud.gateway.server.webflux.routes
      server:
        webflux:
          routes:
            - id: commerce-core
              uri: http://commerce-core.core-services.svc.cluster.local:8081
              predicates:
                - Path=/api/v1/**
              filters:
                - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
