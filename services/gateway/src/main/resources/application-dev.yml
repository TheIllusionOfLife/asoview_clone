server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: commerce-core
          uri: http://commerce-core.core-services.svc.cluster.local:8081
          predicates:
            - Path=/api/v1/**
          filters:
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
