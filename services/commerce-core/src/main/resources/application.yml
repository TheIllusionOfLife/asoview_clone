spring:
  application:
    name: commerce-core
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/asoview}
    username: ${DB_USERNAME:asoview}
    password: ${DB_PASSWORD:asoview}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:db/migration
    placeholders:
      seed_catalog: "false"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gcp:
      spanner:
        project-id: ${SPANNER_PROJECT_ID:asoview-clone}
        instance-id: ${SPANNER_INSTANCE_ID:asoview-clone}
        database: ${SPANNER_DATABASE:asoview}

server:
  port: 8081
