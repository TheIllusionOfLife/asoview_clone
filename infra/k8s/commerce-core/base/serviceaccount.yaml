# Kubernetes ServiceAccount for commerce-core. The Deployment spec
# references serviceAccountName: commerce-core, so this resource MUST
# exist or the pods fail admission with "serviceaccount not found".
#
# Workload Identity binding: the matching Google Service Account is
# created and bound by terraform — see
# infra/terraform/environments/dev/workload-identity.tf
# (google_service_account.commerce_core +
#  google_service_account_iam_member.commerce_core_workload_identity).
# Each environment overlay (dev / staging / prod) patches the
# `iam.gke.io/gcp-service-account` annotation with the email exposed
# by that environment's terraform output `commerce_core_gsa_email`.
# The base ships a placeholder so it stays environment-agnostic.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: commerce-core
  namespace: core-services
  annotations:
    iam.gke.io/gcp-service-account: REPLACE_WITH_GSA_EMAIL
