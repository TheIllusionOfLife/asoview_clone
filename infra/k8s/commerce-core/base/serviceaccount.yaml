# Kubernetes ServiceAccount for commerce-core. The Deployment spec
# references serviceAccountName: commerce-core, so this resource MUST
# exist or the pods fail admission with "serviceaccount not found".
#
# Workload Identity binding: bind a Google Service Account (GSA) to
# this KSA so the pod can authenticate to Cloud SQL Auth Proxy +
# Spanner without baking JSON keys into a Secret. The annotation
# below references the GSA email created by terraform; replace the
# placeholder with the actual email after `terraform apply` (or wire
# it through a kustomize variable from the dev overlay).
#
# IAM binding (run once outside k8s, after terraform apply):
#   gcloud iam service-accounts add-iam-policy-binding \
#     commerce-core@asoview-clone-dev.iam.gserviceaccount.com \
#     --role=roles/iam.workloadIdentityUser \
#     --member="serviceAccount:asoview-clone-dev.svc.id.goog[core-services/commerce-core]"
apiVersion: v1
kind: ServiceAccount
metadata:
  name: commerce-core
  namespace: core-services
  annotations:
    iam.gke.io/gcp-service-account: commerce-core@asoview-clone-dev.iam.gserviceaccount.com
