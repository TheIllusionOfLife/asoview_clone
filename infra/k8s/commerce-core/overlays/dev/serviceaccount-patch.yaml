# Patches the base ServiceAccount's Workload Identity annotation with
# the dev environment's GSA email. The value MUST match
# `terraform output commerce_core_gsa_email` from
# infra/terraform/environments/dev/.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: commerce-core
  namespace: core-services
  annotations:
    iam.gke.io/gcp-service-account: commerce-core@asoview-clone-dev.iam.gserviceaccount.com
