# Edge namespace: Let's Encrypt ClusterIssuer + ingress-nginx Ingress.
# The ingress-nginx controller itself is deployed via its own Argo CD
# Application (infra/argocd/applications/ingress-nginx.yaml) which
# renders the upstream Helm chart. cert-manager similarly.
#
# NOTE: No top-level `namespace:` transformer. ClusterIssuer is
# cluster-scoped and must NOT carry a namespace field — a
# namespace-setting transformer would incorrectly stamp
# `metadata.namespace: edge` onto it. Each namespaced resource (the
# Ingress) sets its own namespace explicitly in its manifest instead.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - clusterissuer.yaml
  - ingress.yaml
