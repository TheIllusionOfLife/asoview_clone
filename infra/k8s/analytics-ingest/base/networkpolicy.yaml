apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: analytics-ingest
  namespace: data-jobs
spec:
  podSelector:
    matchLabels:
      app: analytics-ingest
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: edge
      ports:
        - protocol: TCP
          port: 8085
  egress:
    - {}
