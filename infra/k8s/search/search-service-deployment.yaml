# search-service Spring Boot 4 deployment.
#
# Two replicas behind a ClusterIP service. Connects to the OpenSearch
# statefulset in the same namespace via opensearch:9200. Reads
# product data from commerce-core via the gateway DNS.
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: search
spec:
  selector:
    app: search-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: search
spec:
  replicas: 2
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      # Pod-level securityContext: enforce non-root and a known uid so the
      # container has predictable ownership across restarts. Compatible with
      # the Restricted PodSecurityStandards profile.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: search-service
          # Pinned to an immutable semver tag (NOT :latest) so rollbacks are
          # deterministic and the running version is discoverable from the
          # manifest. Bump in lockstep with releases via Argo CD Image Updater
          # or a manual edit. (PR #21 review H2 from Gemini.)
          image: asia-northeast1-docker.pkg.dev/asoview-clone/services/search-service:0.1.0
          imagePullPolicy: IfNotPresent
          # Container-level hardening: drop all linux capabilities, block
          # privilege escalation, mount the root filesystem read-only.
          # Spring Boot writes nothing to / at runtime so RO is safe; tmp
          # writes (jar extraction, heap dumps) go to an emptyDir below.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: OPENSEARCH_HOST
              value: opensearch
            - name: OPENSEARCH_PORT
              value: "9200"
            - name: OPENSEARCH_SCHEME
              value: http
            - name: COMMERCE_CORE_BASE_URL
              value: http://gateway.edge.svc.cluster.local
            - name: SPRING_PROFILES_ACTIVE
              value: gke
          ports:
            - name: http
              containerPort: 8082
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: "200m"
              memory: "768Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: tmp
          emptyDir: {}
