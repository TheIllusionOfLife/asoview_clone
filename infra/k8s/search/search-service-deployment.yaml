# search-service Spring Boot 4 deployment.
#
# Two replicas behind a ClusterIP service. Connects to the OpenSearch
# statefulset in the same namespace via opensearch:9200. Reads
# product data from commerce-core via the gateway DNS.
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: search
spec:
  selector:
    app: search-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: search
spec:
  replicas: 2
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      containers:
        - name: search-service
          # Pinned by Argo CD Image Updater to a specific Git SHA tag (rather than
          # `:latest`) so rollbacks are deterministic and the running version is
          # discoverable from the manifest. (PR #21 review H2 from Gemini.)
          image: asia-northeast1-docker.pkg.dev/asoview-clone/services/search-service:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: OPENSEARCH_HOST
              value: opensearch
            - name: OPENSEARCH_PORT
              value: "9200"
            - name: OPENSEARCH_SCHEME
              value: http
            - name: COMMERCE_CORE_BASE_URL
              value: http://gateway.edge.svc.cluster.local
            - name: SPRING_PROFILES_ACTIVE
              value: gke
          ports:
            - name: http
              containerPort: 8082
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: "200m"
              memory: "768Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
