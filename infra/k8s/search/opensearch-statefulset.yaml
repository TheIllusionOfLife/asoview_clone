# OpenSearch 3-node statefulset for asoview-clone search.
#
# Single-cluster topology, 3 master-eligible data nodes, plugin
# analysis-kuromoji baked in via initContainer. Persistent volumes
# come from the GKE default storage class. KMS encryption at rest
# is provided by the GCE PD CMEK configured in the
# infra/terraform/modules/opensearch module.
#
# Snapshot uploads use the snapshot-bucket + workload-identity SA
# also provisioned by the Terraform module.
apiVersion: v1
kind: Namespace
metadata:
  name: search
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opensearch
  namespace: search
  annotations:
    iam.gke.io/gcp-service-account: opensearch-snapshots@asoview-clone.iam.gserviceaccount.com
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: search
spec:
  clusterIP: None
  selector:
    app: opensearch
  ports:
    - name: rest
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: search
spec:
  serviceName: opensearch
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      serviceAccountName: opensearch
      securityContext:
        fsGroup: 1000
      # The analysis-kuromoji plugin is baked into a custom image rather than
      # installed by an initContainer — the previous initContainer-based approach
      # installed the plugin to its own ephemeral layer, which the main container
      # never saw (PR #21 review C9 from Devin). Build + push the image with:
      #
      #   gcloud builds submit docker/ \
      #     --config docker/cloudbuild-opensearch.yaml \
      #     --tag asia-northeast1-docker.pkg.dev/asoview-clone/services/opensearch-kuromoji:2.18.0
      #
      # The Dockerfile lives at docker/Dockerfile.opensearch.
      containers:
        - name: opensearch
          image: asia-northeast1-docker.pkg.dev/asoview-clone/services/opensearch-kuromoji:2.18.0
          imagePullPolicy: IfNotPresent
          env:
            - name: cluster.name
              value: asoview-search
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: discovery.seed_hosts
              value: opensearch-0.opensearch,opensearch-1.opensearch,opensearch-2.opensearch
            - name: cluster.initial_cluster_manager_nodes
              value: opensearch-0,opensearch-1,opensearch-2
            - name: bootstrap.memory_lock
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms2g -Xmx2g"
            # Security plugin stays ENABLED in the cluster (PR #21 review H1 from
            # Gemini). Admin password is sourced from a Secret managed by Argo CD;
            # internal users + role mappings are managed via securityadmin.sh in
            # an init Job that runs once per environment. The search-service
            # connects via mTLS using a workload-identity-bound certificate.
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opensearch-admin
                  key: password
          ports:
            - name: rest
              containerPort: 9200
            - name: transport
              containerPort: 9300
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
          readinessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard-rwo
        resources:
          requests:
            storage: 50Gi
