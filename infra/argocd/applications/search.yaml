# Argo CD Application for the search-service stack (OpenSearch + search-service).
#
# Reconciles infra/k8s/search/ into the `search` namespace on the
# asoview-clone-dev cluster.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: search
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: asoview-clone-dev
spec:
  project: default
  source:
    repoURL: https://github.com/TheIllusionOfLife/asoview_clone.git
    targetRevision: main
    path: infra/k8s/search/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: search
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
