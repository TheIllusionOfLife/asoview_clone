apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edge
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: asoview-clone-dev
spec:
  project: default
  source:
    repoURL: https://github.com/TheIllusionOfLife/asoview_clone.git
    targetRevision: main
    path: infra/k8s/edge
  destination:
    server: https://kubernetes.default.svc
    namespace: edge
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # cert-manager CRDs must exist before the ClusterIssuer in
      # clusterissuer.yaml can apply. On the very first sync (before
      # the cert-manager Application has finished installing CRDs),
      # this flag lets the sync retry rather than fail hard on
      # "no matches for kind ClusterIssuer".
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
