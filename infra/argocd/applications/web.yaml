apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: asoview-clone-dev
spec:
  project: default
  source:
    repoURL: https://github.com/TheIllusionOfLife/asoview_clone.git
    targetRevision: main
    path: infra/k8s/web/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: edge
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
