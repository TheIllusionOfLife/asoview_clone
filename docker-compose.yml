services:
  postgres:
    image: postgres:16.6
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: asoview
      POSTGRES_USER: asoview
      POSTGRES_PASSWORD: asoview
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asoview"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.4
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  spanner-emulator:
    image: gcr.io/cloud-spanner-emulator/emulator:1.5.28
    ports:
      - "9010:9010"
      - "9020:9020"

  spanner-init:
    image: google/cloud-sdk:slim
    depends_on:
      - spanner-emulator
    environment:
      SPANNER_EMULATOR_HOST: spanner-emulator:9010
      SPANNER_PROJECT_ID: asoview-clone
      SPANNER_INSTANCE_ID: asoview-clone
      SPANNER_DATABASE_ID: asoview
      SPANNER_DDL_DIR: /ddl
      CLOUDSDK_AUTH_DISABLE_CREDENTIALS: "true"
      CLOUDSDK_API_ENDPOINT_OVERRIDES_SPANNER: http://spanner-emulator:9020/
      CLOUDSDK_CORE_PROJECT: asoview-clone
    volumes:
      - ./docker/spanner-init.sh:/usr/local/bin/spanner-init.sh:ro
      - ./services/commerce-core/src/main/resources/db/spanner:/ddl:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/spanner-init.sh"]
    restart: "no"

  firebase-auth-emulator:
    image: ghcr.io/spectoolco/firebase-tools:13.29.1
    command: ["firebase", "emulators:start", "--only", "auth", "--project", "asoview-clone"]
    ports:
      - "9099:9099"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9099 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch:
    build:
      context: .
      dockerfile: docker/Dockerfile.opensearch
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "Asoview!1"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    depends_on:
      - opensearch
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"

volumes:
  postgres-data:
