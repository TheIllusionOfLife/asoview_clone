services:
  postgres:
    image: postgres:16.6
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: asoview
      POSTGRES_USER: asoview
      POSTGRES_PASSWORD: asoview
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asoview"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.4
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  spanner-emulator:
    image: gcr.io/cloud-spanner-emulator/emulator:1.5.28
    ports:
      - "9010:9010"
      - "9020:9020"

  spanner-init:
    image: google/cloud-sdk:slim
    depends_on:
      - spanner-emulator
    environment:
      SPANNER_EMULATOR_HOST: spanner-emulator:9010
      SPANNER_PROJECT_ID: asoview-local
      SPANNER_INSTANCE_ID: asoview-local
      SPANNER_DATABASE_ID: commerce
      SPANNER_DDL_DIR: /ddl
      CLOUDSDK_AUTH_DISABLE_CREDENTIALS: "true"
      CLOUDSDK_API_ENDPOINT_OVERRIDES_SPANNER: http://spanner-emulator:9020/
      CLOUDSDK_CORE_PROJECT: asoview-local
    volumes:
      - ./docker/spanner-init.sh:/usr/local/bin/spanner-init.sh:ro
      - ./services/commerce-core/src/main/resources/db/spanner:/ddl:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/spanner-init.sh"]
    restart: "no"

volumes:
  postgres-data:
