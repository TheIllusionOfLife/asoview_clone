services:
  postgres:
    image: postgres:16.6
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: asoview
      POSTGRES_USER: asoview
      POSTGRES_PASSWORD: asoview
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asoview"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.4
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  spanner-emulator:
    image: gcr.io/cloud-spanner-emulator/emulator:1.5.28
    ports:
      - "9010:9010"
      - "9020:9020"

volumes:
  postgres-data:
