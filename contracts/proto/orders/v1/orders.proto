syntax = "proto3";

package orders.v1;

import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "com.asoviewclone.proto.orders.v1";

message Order {
  string order_id = 1;
  string user_id = 2;
  OrderStatus status = 3;
  string total_amount = 4;
  string currency = 5;
  string idempotency_key = 6;
  repeated OrderItem items = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message OrderItem {
  string order_item_id = 1;
  string order_id = 2;
  string product_variant_id = 3;
  string slot_id = 4;
  int32 quantity = 5;
  string unit_price = 6;
  google.protobuf.Timestamp created_at = 7;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PENDING = 1;
  ORDER_STATUS_PAYMENT_PENDING = 2;
  ORDER_STATUS_PAID = 3;
  ORDER_STATUS_CANCELLED = 4;
  ORDER_STATUS_REFUNDED = 5;
}

message CreateOrderRequest {
  string user_id = 1;
  string idempotency_key = 2;
  repeated CreateOrderItem items = 3;
}

message CreateOrderItem {
  string product_variant_id = 1;
  string slot_id = 2;
  int32 quantity = 3;
}

message CreateOrderResponse {
  Order order = 1;
}

message GetOrderRequest {
  string order_id = 1;
}

message GetOrderResponse {
  Order order = 1;
}

message ListUserOrdersRequest {
  string user_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListUserOrdersResponse {
  repeated Order orders = 1;
  string next_page_token = 2;
}

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc ListUserOrders(ListUserOrdersRequest) returns (ListUserOrdersResponse);
}
